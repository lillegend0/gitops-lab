apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:lillegend0/https://github.com/lillegend0/DevOps-Production-Platform-k3s-GitOps-Observability.git
    targetRevision: HEAD
    path: platform/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
