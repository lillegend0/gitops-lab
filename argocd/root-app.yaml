apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitops-lab
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/lillegend0/gitops-lab.git
    targetRevision: main
    path: apps

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
